name: Diagnose CI Sheets connectivity

# TEMPORARY diagnostic — manual only (no schedule). Confirms the GitHub repo
# secrets build valid creds and the service account can open the live Sheet.
# Read-only: scripts/diagnose_ci_secrets.py never writes to the chain. Delete
# this workflow (and the script) once CI credentials are confirmed working.

on:
  workflow_dispatch: {}     # manual trigger only — never runs on a schedule

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # matches local 3.11.9
          cache: pip

      - name: Install minimal deps
        # Only what the diagnostic needs (no pandas/yfinance/ML stack).
        run: |
          python -m pip install --upgrade pip
          pip install \
            "streamlit>=1.35.0" \
            "gspread>=6.2.1,<7.0.0" \
            "google-auth>=2.49.1,<3.0.0"

      - name: Write .streamlit/secrets.toml from repo secrets
        # Same rebuild as the scoring workflow: full SA JSON in one secret,
        # re-serialized via json.dumps so the private key's newlines survive as
        # valid TOML. No `set -x`; the file is never printed.
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TRACK_SHEET_ID: ${{ secrets.TRACK_SHEET_ID }}
          TRACK_WORKSHEET_NAME: ${{ secrets.TRACK_WORKSHEET_NAME }}
        run: |
          python - <<'PY'
          import json, os, pathlib
          sa = json.loads(os.environ["GCP_SERVICE_ACCOUNT"])
          lines = ["[gcp_service_account]"]
          for k, v in sa.items():
              lines.append(f"{k} = {json.dumps(v)}")
          lines += ["", "[track_record]",
                    f"sheet_id = {json.dumps(os.environ['TRACK_SHEET_ID'])}",
                    f"worksheet_name = {json.dumps(os.environ['TRACK_WORKSHEET_NAME'])}"]
          d = pathlib.Path(".streamlit"); d.mkdir(exist_ok=True)
          (d / "secrets.toml").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Wrote .streamlit/secrets.toml: {len(sa)} service-account keys, "
                "track_record section set.")
          PY

      - name: Run diagnostic (read-only)
        run: python scripts/diagnose_ci_secrets.py

      - name: Remove runtime secrets file
        if: always()   # belt-and-suspenders; the runner is ephemeral anyway
        run: rm -f .streamlit/secrets.toml
