name: probe-yfinance (one-off diagnostic)

# Read-only, manual-only. Tells us whether a GitHub runner IP can fetch fresh
# OHLC from Yahoo. Remove after reading the result (like the #9 diagnostic
# scaffolding). Does NOT touch the score-outcomes.yml workflow.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: probe-yfinance
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (probe script only)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yfinance
        run: pip install --quiet yfinance pandas

      - name: Run yfinance probe
        run: python scripts/probe_yfinance.py
